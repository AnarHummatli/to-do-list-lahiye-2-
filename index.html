<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="orange"></div>
        <div class="main">
            <h1>Task Tracker</h1>
            <img class="sort" src="Image/sort_down.svg" alt="Sort Image">
            <br>
            <label class="search">
                <input type="text">
                <img src="Image/exit.svg" alt="Exit Image">
            </label>
            <br>
            <label class="add">
                <button>+</button>
                <button>Add</button>
            </label>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
